<script type="math/tex; mode=display">C^K = \frac{1}{2}m \sum_{i=0}^{i=n}\frac{\Delta x_i^2 + \Delta y_i^2 + \Delta z_i^2}{\Delta t_i}</script>

<p>in a constrained optimization</p>

<script type="math/tex; mode=display">s* = argmin \; C^K \\ 
		x_0, y_0, t_0 = given\\
		x_n, y_n = given
		st. \; t_n \leq MaxTime</script>

<p>Spring energy is</p>

<script type="math/tex; mode=display">C^S = \frac{1}{2}k\sum_{i=0}^{i=n}(\Delta x^2 + \Delta y^2 + \Delta z^2 + \Delta t^2)</script>

<p>nonzero spring</p>

<script type="math/tex; mode=display">\frac{1}{2}k \sum_{i=0}^{i=n}(\Delta x - l)^2 \\
